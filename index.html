<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel de Control del Bot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      background: #0d1117;
      color: #fff;
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    .container {
      max-width: 600px;
      margin: auto;
      background: #161b22;
      padding: 20px;
      border-radius: 10px;
      border: 1px solid #30363d;
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
      border: none;
      font-size: 16px;
    }

    button {
      background: #238636;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #2ea043;
    }

    .hidden {
      display: none;
    }

    .section {
      margin-top: 20px;
      padding: 15px;
      background: #21262d;
      border-radius: 8px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Panel de Control del Bot</h2>
    <p>Introduce la ID de tu bot para gestionar sus ajustes.</p>

    <input id="botIdInput" type="text" placeholder="ID del bot">
    <button onclick="buscarBot()">Buscar bot</button>

    <p id="status"></p>

    <!-- Ajustes -->
    <div id="settings" class="hidden">
      <h3>Ajustes del Bot</h3>

      <div class="section">
        <label>Estado del bot:</label>
        <select id="botStatus">
          <option value="online">Online</option>
          <option value="idle">Idle</option>
          <option value="dnd">No molestar</option>
        </select>
      </div>

      <div class="section">
        <label>Mensaje de bienvenida:</label>
        <input id="welcomeMessage" type="text" placeholder="Hola! Soy tu bot.">
      </div>

      <div class="section">
        <label>Anti-ping:</label>
        <select id="antiPing">
          <option value="off">Desactivado</option>
          <option value="warn">Advertencia</option>
          <option value="mute">Mute</option>
        </select>
      </div>

      <button onclick="guardarAjustes()">Guardar ajustes</button>
    </div>
  </div>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // Tu configuración de Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyD13N4-9MjTrmlPwGP7mves0Exje4v2ACw",
      authDomain: "kahoot-8529e.firebaseapp.com",
      databaseURL: "https://kahoot-8529e-default-rtdb.firebaseio.com",
      projectId: "kahoot-8529e",
      storageBucket: "kahoot-8529e.firebasestorage.app",
      messagingSenderId: "313414356056",
      appId: "1:313414356056:web:4aab4587f7df9393008e2d",
      measurementId: "G-8T4CPC1BQ3"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Buscar bot por ID
    window.buscarBot = async function () {
      const botId = document.getElementById("botIdInput").value.trim();
      const status = document.getElementById("status");

      if (!botId) {
        status.textContent = "Introduce una ID válida.";
        return;
      }

      const botRef = ref(db, "bots/" + botId);
      const snapshot = await get(botRef);

      if (snapshot.exists()) {
        status.textContent = "✔ Bot encontrado. Cargando ajustes...";
        document.getElementById("settings").classList.remove("hidden");

        const data = snapshot.val();

        document.getElementById("botStatus").value = data.status || "online";
        document.getElementById("welcomeMessage").value = data.welcome || "";
        document.getElementById("antiPing").value = data.antiPing || "off";

      } else {
        status.textContent = "❌ Este bot no existe en la base de datos.";
        document.getElementById("settings").classList.add("hidden");
      }
    };

    // Guardar ajustes
    window.guardarAjustes = async function () {
      const botId = document.getElementById("botIdInput").value.trim();
      const status = document.getElementById("status");

      const ajustes = {
        status: document.getElementById("botStatus").value,
        welcome: document.getElementById("welcomeMessage").value,
        antiPing: document.getElementById("antiPing").value
      };

      await set(ref(db, "bots/" + botId), ajustes);

      status.textContent = "✔ Ajustes guardados correctamente.";
    };
  </script>

</body>
</html>
